<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>巴士到站</title>
<style>
  :root {
    --bg: #000000;
    --card: rgba(28, 28, 30, 0.82);
    --separator: rgba(84, 84, 88, 0.42);
    --label: #ffffff;
    --secondary: rgba(235, 235, 245, 0.6);
    --tertiary: rgba(235, 235, 245, 0.3);
    --red: #ff453a; --yellow: #ffd60a; --green: #30d158;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--label);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro TC", "PingFang HK", "Noto Sans HK", sans-serif;
    display: flex; flex-direction: column;
    padding: 3.4vh 4.5vw 2.2vh;
    overflow: hidden;
  }
  header { display: flex; align-items: baseline; justify-content: space-between; padding: 0 0.4vw 1.6vh; }
  h1 { font-size: clamp(22px, 4.4vw, 42px); font-weight: 700; letter-spacing: -0.022em; }
  .clock {
    font-size: clamp(18px, 3.2vw, 32px); font-weight: 500;
    font-variant-numeric: tabular-nums; color: var(--secondary); letter-spacing: -0.01em;
  }
  .card {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: var(--card);
    -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
    border-radius: clamp(16px, 2.4vw, 26px);
    padding: 0.4vh 0;
  }
  .row {
    display: grid; grid-template-columns: minmax(4.6em, auto) 1fr auto;
    gap: 3vw; align-items: center;
    padding: 1.35vh 4.2vw;
    position: relative;
  }
  .row + .row::before {
    content: ""; position: absolute; top: 0; left: 4.2vw; right: 0;
    height: 0.5px; background: var(--separator);
  }
  .pill {
    justify-self: start;
    font-size: clamp(16px, 3vw, 30px); font-weight: 700; letter-spacing: -0.01em;
    padding: 0.14em 0.5em; border-radius: 0.42em;
    min-width: 2.5em; text-align: center; font-variant-numeric: tabular-nums;
  }
  .pill.kmb { background: var(--red); color: #fff; }
  .pill.ctb { background: var(--yellow); color: #1c1400; }
  .pill.gmb { background: var(--green); color: #003217; }
  .dest { font-size: clamp(15px, 2.8vw, 28px); font-weight: 600; letter-spacing: -0.016em; line-height: 1.28; }
  .sub { font-size: clamp(10px, 1.55vw, 15px); font-weight: 400; color: var(--secondary); margin-top: 0.2em; letter-spacing: -0.005em; }
  .rmk { color: var(--yellow); }
  .when { text-align: right; white-space: nowrap; }
  .min { font-size: clamp(21px, 4vw, 40px); font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .min.now { color: var(--green); font-size: clamp(15px, 2.6vw, 26px); }
  .unit { font-size: clamp(10px, 1.7vw, 16px); font-weight: 500; color: var(--secondary); margin-left: 0.3em; }
  .at { font-size: clamp(10px, 1.55vw, 15px); color: var(--tertiary); margin-top: 0.15em; font-variant-numeric: tabular-nums; }
  .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--secondary); font-size: clamp(14px, 2.4vw, 22px); text-align: center; line-height: 1.9; font-weight: 500; }
  footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.4vh 0.6vw 0; font-size: clamp(9px, 1.35vw, 13px); color: var(--tertiary); font-weight: 500;
  }
  .dot { display: inline-block; width: 0.55em; height: 0.55em; border-radius: 50%; margin: 0 0.45em 0 1.1em; vertical-align: 0.02em; }
  .dot:first-child { margin-left: 0; }
  #stale { color: var(--red); display: none; font-weight: 600; }
</style>
</head>
<body>
<header><h1 id="title">巴士到站</h1><div class="clock" id="clock">--:--:--</div></header>
<div class="card"><div id="rows" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"><div class="empty">載入中…</div></div></div>
<footer>
  <span id="updated"></span>
  <span id="stale">未能更新</span>
  <span><span class="dot" style="background:var(--red)"></span>九巴<span class="dot" style="background:var(--yellow)"></span>城巴<span class="dot" style="background:var(--green)"></span>專線小巴</span>
</footer>
<script>
(function () {
  var rowsEl = document.getElementById('rows');
  var titleEl = document.getElementById('title');
  var clockEl = document.getElementById('clock');
  var updatedEl = document.getElementById('updated');
  var staleEl = document.getElementById('stale');
  var refreshSeconds = 20;

  function pad(n) { return (n < 10 ? '0' : '') + n; }
  function tick() {
    var d = new Date();
    clockEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }
  setInterval(tick, 1000); tick();

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  function rowHtml(a, lang) {
    var dest = lang === 'en' ? a.destEn : a.destTc;
    var rmk = lang === 'en' ? a.remarkEn : a.remarkTc;
    var minHtml;
    if (a.minutes <= 0) {
      minHtml = '<div class="min now">即將到達</div>';
    } else {
      minHtml = '<span class="min' + (a.minutes <= 3 ? ' now' : '') + '">' + a.minutes + '</span><span class="unit">分鐘</span>';
    }
    return '<div class="row">' +
      '<div class="pill ' + esc(a.operator) + '">' + esc(a.route) + '</div>' +
      '<div><div class="dest">' + esc(dest) + '</div>' +
      '<div class="sub">' + esc(a.stopLabel) + (rmk ? '  ·  <span class="rmk">' + esc(rmk) + '</span>' : '') + '</div></div>' +
      '<div class="when">' + minHtml + '<div class="at">' + esc(a.etaTime) + '</div></div>' +
      '</div>';
  }

  function load() {
    fetch('/api/eta', { cache: 'no-store' }).then(function (r) { return r.json(); }).then(function (data) {
      refreshSeconds = data.refreshSeconds || 20;
      if (data.title) { titleEl.textContent = data.title; document.title = data.title; }
      staleEl.style.display = data.stale ? 'inline' : 'none';
      if (!data.arrivals || data.arrivals.length === 0) {
        rowsEl.innerHTML = '<div class="empty">暫時沒有班次<br><small style="color:var(--tertiary)">夜晚收車後屬正常</small></div>';
      } else {
        var html = '';
        var max = Math.min(data.arrivals.length, 11);
        for (var i = 0; i < max; i++) html += rowHtml(data.arrivals[i], data.language);
        rowsEl.innerHTML = html;
      }
      if (data.updatedAt) updatedEl.textContent = '更新於 ' + data.updatedAt.substring(11, 19);
    }).catch(function () {
      staleEl.style.display = 'inline';
    }).then(function () {
      setTimeout(load, refreshSeconds * 1000);
    });
  }
  load();
})();
</script>
</body>
</html>
